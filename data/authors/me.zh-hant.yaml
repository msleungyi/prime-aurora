bio: "我是香港前小學中國語文教師，現為慕尼黑大學心理語言學博士研究員。我的研究涵蓋學習閱讀的認知機制，以及有關劃分發展性讀寫障礙（Developmental Dyslexia）類型的方法論。我注重實踐開放科學（Open Science）的理念，並重視科學理論能否應用於實際教學環境。我希望轉譯公共知識，將複雜的認知理論轉化為實用、易明，且具實證基礎的資源，協助研究人員、教師、臨床工作者及家長理解及支援語文學習。"
